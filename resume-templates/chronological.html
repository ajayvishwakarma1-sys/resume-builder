<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronological Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>{{name}}</h1>
    <p>{{email}} | {{phone}}</p>
    <h2>Summary</h2>
    <p>Highly motivated and experienced professional with a strong background in {{skills}}.</p>
    <h2>Work Experience</h2>
    <ul>
        <li>{{experience}}</li>
    </ul>
    <h2>Education</h2>
    <ul>
        <li>{{education}}</li>
    </ul>
    <h2>Skills</h2>
    <ul>
        <li>{{skills}}</li>
    </ul>
</body>
</html>
